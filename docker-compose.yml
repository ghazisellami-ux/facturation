version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: sicfacture-db
    restart: always
    environment:
      POSTGRES_USER: sicfacture
      POSTGRES_PASSWORD: sicfacture2024
      POSTGRES_DB: sicfacture
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sicfacture"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sicfacture-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sicfacture-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://sicfacture:sicfacture2024@db:5432/sicfacture
      - SECRET_KEY=sic-facture-secret-key-change-in-production-2024
      - FRONTEND_URL=http://localhost:3002
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sicfacture-network

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sicfacture-frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
      - BACKEND_INTERNAL_URL=http://backend:8000
    ports:
      - "3002:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - sicfacture-network

volumes:
  postgres_data:

networks:
  sicfacture-network:
    driver: bridge
